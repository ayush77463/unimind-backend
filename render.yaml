services:
  - type: web
    name: unimind-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RENDER_DISK_PATH
        value: /opt/render/project/src/storage
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: unimind-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
